name: Release on version change

on:
  push:
    branches:
      - main
    paths:
      - "src/main/resources/VERSION"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Read version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < src/main/resources/VERSION)"
          if [ -z "$VERSION" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build runnable jar
        run: ./mvnw -q package

      - name: Build release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1 || true)"
          {
            echo "## Wichtigste Aenderungen"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "${PREVIOUS_TAG}..HEAD" --no-merges --pretty=format:'- %s (%h)' -n 20
            else
              git log HEAD --no-merges --pretty=format:'- %s (%h)' -n 20
            fi
          } > release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          JAR="target/devflow-ui-1.0.0-SNAPSHOT.jar"
          ASSET="devflow-${VERSION}.jar"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "DevFlow ${VERSION}" --notes-file release-notes.md --latest
            gh release upload "$TAG" "$JAR#$ASSET" --clobber
          else
            gh release create "$TAG" "$JAR#$ASSET" --title "DevFlow ${VERSION}" --notes-file release-notes.md --latest
          fi
