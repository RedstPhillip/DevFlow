name: Publish update jar

on:
  push:
    branches:
      - main
    paths-ignore:
      - "updates/devflow-latest.jar"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build runnable jar
        run: ./mvnw -q package

      - name: Publish update jar
        run: |
          mkdir -p updates
          cp target/devflow-ui-1.0.0-SNAPSHOT.jar updates/devflow-latest.jar
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/devflow-latest.jar
          if git diff --cached --quiet; then
            echo "Update jar unchanged."
          else
            git commit -m "Publish latest update jar [skip ci]"
            git push
          fi
